# ~/.config/tmux/tmux.conf — managed by chezmoi
#
# Memorable keybindings cheat sheet (PREFIX = Ctrl-Space):
#   Sessions
#     Ctrl-Space  d       detach (session keeps running in background)
#     Ctrl-Space  s       list/switch sessions
#     Ctrl-Space  $       rename current session
#     CLI:    tmux ls                 list background sessions
#             tmux new  -s <name>     create named session
#             tmux attach -t <name>   re-attach (or just `ta <name>`)
#             tmux kill-session -t <name>
#
#   Windows (tabs)
#     Ctrl-Space  c       new window
#     Ctrl-Space  ,       rename window
#     Ctrl-Space  n / p   next / previous window
#     Ctrl-Space  1..9    jump to window N
#
#   Panes (splits)
#     Ctrl-Space  \       split vertical
#     Ctrl-Space  -       split horizontal
#     Ctrl-Space  h/j/k/l move between panes (vim-style)
#     Ctrl-Space  H/J/K/L resize panes
#     Ctrl-Space  z       zoom (toggle fullscreen for current pane)
#     Ctrl-Space  x       kill pane
#
#   Other
#     Ctrl-Space  r       reload this config
#     Ctrl-Space  [       enter copy mode (vi keys; y to yank, q to exit)

# ── Prefix: Ctrl-Space ─────────────────────────────────────────────────────────
unbind C-b
unbind C-a
set -g prefix C-Space
bind C-Space send-prefix      # press Ctrl-Space twice to send a literal Ctrl-Space

# ── General behavior ──────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-256color:Tc,alacritty:Tc,kitty:Tc"
set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
setw -g status-keys emacs
set -g set-titles on
set -g set-titles-string "#S · #W"

# ── Splits — open in current pane's working directory ─────────────────────────
unbind '"'
unbind %
unbind |
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"

# ── Vim-style pane navigation and resizing ────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# ── Quality of life ───────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux config reloaded"
bind C-l send-keys 'C-l'

# ── Copy mode: vi-style, system clipboard ─────────────────────────────────────
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy 2>/dev/null || xclip -selection clipboard 2>/dev/null || pbcopy 2>/dev/null"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy 2>/dev/null || xclip -selection clipboard 2>/dev/null || pbcopy 2>/dev/null"

# ── Status line — Catppuccin Mocha ────────────────────────────────────────────
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 50
set -g status-right-length 90
set -g status-left  "#[fg=#f38ba8,bg=#1e1e2e]#[fg=#11111b,bg=#f38ba8,bold] #S #[fg=#f38ba8,bg=#1e1e2e] "
set -g status-right "#{?client_prefix,#[fg=#11111b,bg=#f9e2af,bold] ⌨ PREFIX #[fg=#f9e2af,bg=#b4befe],}#[fg=#11111b,bg=#b4befe]  %H:%M #[fg=#11111b,bg=#89b4fa]  %d-%b #[fg=#89b4fa,bg=#1e1e2e]"
set -g window-status-separator ""
set -g window-status-format         "#[fg=#6c7086,bg=#1e1e2e] #I:#W "
set -g window-status-current-format "#[fg=#11111b,bg=#a6e3a1,bold] #I:#W#{?window_zoomed_flag, 󰊓,} #[fg=#a6e3a1,bg=#1e1e2e]"
set -g pane-border-style          "fg=#45475a"
set -g pane-active-border-style   "fg=#89b4fa"
set -g message-style              "bg=#1e1e2e,fg=#89dceb"
