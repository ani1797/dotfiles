"$schema" = 'https://starship.rs/config-schema.json'

# ── Global settings ────────────────────────────────────────────────────────────
# Abort any single command that takes longer than 500 ms — prevents hangs on
# network mounts, huge git repos, or slow language runtimes.
command_timeout = 500

# ── Prompt layout ──────────────────────────────────────────────────────────────
# Floating-pill style: rounded identity and directory pills, inline coloured
# text for contextual modules (git, languages, docker), right-aligned time
# pill. Two-line layout keeps the input cursor on a clean line.
format = """
[](red)\
$os\
$username\
$hostname\
[](fg:red) \
[](peach)\
$directory\
[](fg:peach)\
$git_branch\
$git_status\
$c\
$rust\
$golang\
$nodejs\
$bun\
$python\
$docker_context\
$fill\
$cmd_duration\
[](lavender)\
$time\
[](fg:lavender)\
$line_break\
$character"""

palette = 'catppuccin_mocha'

# ── OS & identity ──────────────────────────────────────────────────────────────
[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Unknown   = "󰣇"
CachyOS   = "󰣇"
Windows   = ""
Ubuntu    = "󰕈"
SUSE      = ""
Raspbian  = "󰐿"
Mint      = "󰣭"
Macos     = "󰀵"
Manjaro   = ""
Linux     = "󰌽"
Gentoo    = "󰣨"
Fedora    = "󰣛"
Alpine    = ""
Amazon    = ""
Android   = ""
AOSC      = ""
Arch      = "󰣇"
Artix     = "󰣇"
CentOS    = ""
Debian    = "󰣚"
Redhat    = "󱄛"
RedHatEnterprise = "󱄛"

[username]
show_always = true
style_user  = "bg:red fg:crust"
style_root  = "bg:red fg:crust"
format      = '[ $user]($style)'

[hostname]
ssh_only = false
style    = "bg:red fg:crust"
format   = '[@$hostname]($style)'

# ── Directory ──────────────────────────────────────────────────────────────────
[directory]
style               = "bg:peach fg:crust"
format              = "[ $path ]($style)"
truncation_length   = 3
truncation_symbol   = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures"  = " "
"Developer" = "󰲫 "

# ── Git ────────────────────────────────────────────────────────────────────────
[git_branch]
symbol = ""
style  = "bold fg:yellow"
format = '[ $symbol $branch]($style)'

[git_status]
style  = "fg:yellow"
format = '[ $all_status$ahead_behind]($style)'

# ── Language modules ───────────────────────────────────────────────────────────
# All modules use detect_files / detect_extensions / detect_folders so they
# only activate inside a relevant project — no subprocess cost on every prompt.
# version_format shows major.minor only (v20.11 rather than v20.11.0).

[nodejs]
symbol         = ""
style          = "fg:green"
format         = '[ $symbol $version]($style)'
version_format = "v${major}.${minor}"
detect_files   = ["package.json", ".nvmrc", ".node-version"]
detect_folders = ["node_modules"]
detect_extensions = ["js", "ts", "mjs", "cjs"]

[bun]
symbol         = ""
style          = "fg:green"
format         = '[ $symbol $version]($style)'
version_format = "v${major}.${minor}"
detect_files   = ["bun.lockb", "bunfig.toml"]

[rust]
symbol         = ""
style          = "fg:green"
format         = '[ $symbol $version]($style)'
version_format = "v${major}.${minor}"
detect_files      = ["Cargo.toml", "Cargo.lock"]
detect_extensions = ["rs"]

[golang]
symbol         = ""
style          = "fg:green"
format         = '[ $symbol $version]($style)'
version_format = "v${major}.${minor}"
detect_files      = ["go.mod", "go.sum", ".go-version"]
detect_extensions = ["go"]
detect_folders    = ["vendor"]

[python]
symbol         = ""
style          = "fg:green"
format         = '[ $symbol $version(\($virtualenv\))]($style)'
version_format = "v${major}.${minor}"
detect_files      = ["pyproject.toml", "requirements.txt", "setup.py", "setup.cfg",
                     "Pipfile", ".python-version", "uv.toml"]
detect_extensions = ["py"]
detect_folders    = [".venv", "venv", "__pycache__"]

[c]
symbol         = " "
style          = "fg:green"
format         = '[ $symbol $version]($style)'
version_format = "v${major}.${minor}"
detect_files      = ["CMakeLists.txt", "Makefile", "meson.build"]
detect_extensions = ["c", "h", "cpp", "hpp", "cc", "cxx"]

# Removed from format (uncomment + add to format string to re-enable):
# php, java, kotlin, haskell — add detect conditions if needed

[php]
disabled = true

[java]
disabled = true

[kotlin]
disabled = true

[haskell]
disabled = true

# ── Docker context ─────────────────────────────────────────────────────────────
# only_with_files: only show when a compose file is present in the directory.
# Avoids calling docker/podman on every prompt.
[docker_context]
symbol         = ""
style          = "fg:sapphire"
format         = '[ $symbol $context]($style)'
only_with_files = true
detect_files   = ["docker-compose.yml", "docker-compose.yaml",
                  "compose.yml", "compose.yaml", "Dockerfile"]

# ── conda (disabled — re-enable if you use conda environments) ────────────────
[conda]
disabled = true

# ── Fill ──────────────────────────────────────────────────────────────────────
[fill]
symbol = " "

# ── Time ──────────────────────────────────────────────────────────────────────
[time]
disabled     = false
time_format  = "%R"
style        = "bg:lavender"
format       = '[[  $time ](fg:crust bg:lavender)]($style)'

# ── Command duration ───────────────────────────────────────────────────────────
[cmd_duration]
show_milliseconds  = true
format             = '[ 󱫌 $duration](fg:mauve)'
style              = "fg:mauve"
disabled           = false
show_notifications = true
min_time_to_notify = 45000

# ── Prompt character ───────────────────────────────────────────────────────────
[line_break]
disabled = false

[character]
disabled                   = false
success_symbol             = '[❯](bold fg:green)'
error_symbol               = '[❯](bold fg:red)'
vimcmd_symbol              = '[❮](bold fg:green)'
vimcmd_replace_one_symbol  = '[❮](bold fg:lavender)'
vimcmd_replace_symbol      = '[❮](bold fg:lavender)'
vimcmd_visual_symbol       = '[❮](bold fg:yellow)'

# ── Catppuccin Mocha palette ───────────────────────────────────────────────────
