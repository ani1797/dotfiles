# hyprpaper.conf — wallpaper configuration
# Place wallpapers in ~/.config/hypr/wallpapers/

# Preload the wallpaper into memory:
# preload = ~/.config/hypr/wallpapers/wallpaper.jpg

# Set it on the monitor:
# wallpaper = ,~/.config/hypr/wallpapers/wallpaper.jpg

# Splash screen (set to false to hide the hyprpaper log)
splash = false
