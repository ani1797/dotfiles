# look.conf — borders, gaps, rounding, animations, Catppuccin Mocha theme

# Catppuccin Mocha palette
$rosewater = rgb(f5e0dc)
$flamingo  = rgb(f2cdcd)
$pink      = rgb(f5c2e7)
$mauve     = rgb(cba6f7)
$red       = rgb(f38ba8)
$maroon    = rgb(eba0ac)
$peach     = rgb(fab387)
$yellow    = rgb(f9e2af)
$green     = rgb(a6e3a1)
$teal      = rgb(94e2d5)
$sky       = rgb(89dceb)
$sapphire  = rgb(74c7ec)
$blue      = rgb(89b4fa)
$lavender  = rgb(b4befe)
$text      = rgb(cdd6f4)
$subtext1  = rgb(bac2de)
$overlay2  = rgb(9399b2)
$surface2  = rgb(585b70)
$surface1  = rgb(45475a)
$surface0  = rgb(313244)
$base      = rgb(1e1e2e)
$mantle    = rgb(181825)
$crust     = rgb(11111b)

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = $mauve $blue 45deg
    col.inactive_border = $surface1
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 4
        passes = 2
        vibrancy = 0.1696
    }
    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(1a1a2eee)
    }
}

animations {
    enabled = true
    bezier = easeOut, 0.16, 1, 0.3, 1
    bezier = easeInOut, 0.85, 0, 0.15, 1
    animation = windows, 1, 4, easeOut
    animation = windowsOut, 1, 4, easeOut, popin 80%
    animation = border, 1, 5, default
    animation = fade, 1, 4, easeOut
    animation = workspaces, 1, 4, easeInOut, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}
