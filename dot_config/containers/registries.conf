# ~/.config/containers/registries.conf
# User-level registry configuration — overrides /etc/containers/registries.conf.
# Inherits all system registry entries. Add per-user overrides or mirrors here.
# Docs: https://github.com/containers/image/blob/main/docs/containers-registries.conf.5.md

# Preserve docker.io as primary search registry (mirrors system config + Docker CLI behaviour)
unqualified-search-registries = ["docker.io"]

# ── Per-user mirror example (uncomment to enable) ─────────────────────────────────────
# To add a personal mirror for Docker Hub:
# [[registry]]
# prefix = "docker.io"
# mirror = [{location = "mirror.gcr.io"}]
