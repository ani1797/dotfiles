# keybinds.conf — keyboard shortcuts
# SUPER = Windows/Meta key

$mod = SUPER
$terminal = kitty
$launcher = wofi --show drun
$browser = firefox
$filemanager = thunar

# ── Core ──────────────────────────────────────────────────────────────────────
bind = $mod, Return,    exec, $terminal
bind = $mod, Space,     exec, $launcher
bind = $mod, B,         exec, $browser
bind = $mod, E,         exec, $filemanager
bind = $mod SHIFT, Q,   killactive
bind = $mod SHIFT, M,   exit
bind = $mod, F,         fullscreen
bind = $mod SHIFT, F,   togglefloating
bind = $mod, P,         pseudo
bind = $mod, J,         togglesplit

# ── Focus movement ────────────────────────────────────────────────────────────
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H,     movefocus, l
bind = $mod, L,     movefocus, r
bind = $mod, K,     movefocus, u
bind = $mod, J,     movefocus, d

# ── Window movement ───────────────────────────────────────────────────────────
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# ── Resize ────────────────────────────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Workspaces 1-9 ────────────────────────────────────────────────────────────
$ws1 = 1
$ws2 = 2
$ws3 = 3
$ws4 = 4
$ws5 = 5
$ws6 = 6
$ws7 = 7
$ws8 = 8
$ws9 = 9

bind = $mod, 1, workspace, $ws1
bind = $mod, 2, workspace, $ws2
bind = $mod, 3, workspace, $ws3
bind = $mod, 4, workspace, $ws4
bind = $mod, 5, workspace, $ws5
bind = $mod, 6, workspace, $ws6
bind = $mod, 7, workspace, $ws7
bind = $mod, 8, workspace, $ws8
bind = $mod, 9, workspace, $ws9

bind = $mod SHIFT, 1, movetoworkspace, $ws1
bind = $mod SHIFT, 2, movetoworkspace, $ws2
bind = $mod SHIFT, 3, movetoworkspace, $ws3
bind = $mod SHIFT, 4, movetoworkspace, $ws4
bind = $mod SHIFT, 5, movetoworkspace, $ws5
bind = $mod SHIFT, 6, movetoworkspace, $ws6
bind = $mod SHIFT, 7, movetoworkspace, $ws7
bind = $mod SHIFT, 8, movetoworkspace, $ws8
bind = $mod SHIFT, 9, movetoworkspace, $ws9

# ── Special workspace (scratchpad) ────────────────────────────────────────────
bind = $mod, S,       togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic

# ── Screenshot (grim + slurp + swappy) ────────────────────────────────────────
bind = , Print,       exec, grim - | swappy -f -               # full screen
bind = $mod, Print,   exec, grim -g "$(slurp)" - | swappy -f - # region

# ── Volume (pipewire/pactl) ────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioLowerVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl  = , XF86AudioMute,         exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl  = , XF86AudioMicMute,      exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# ── Brightness ────────────────────────────────────────────────────────────────
bindel = , XF86MonBrightnessUp,   exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# ── Clipboard history (cliphist + wofi) ───────────────────────────────────────
bind = $mod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# ── Lock screen ───────────────────────────────────────────────────────────────
bind = $mod, Escape, exec, hyprlock
