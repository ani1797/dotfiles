# ~/.config/containers/containers.conf
# User-level Podman configuration — overrides system defaults.
# Docs: https://github.com/containers/common/blob/main/docs/containers.conf.5.md

[containers]
# Use host timezone inside containers by default
tz = "local"

[engine]
# Rootless socket path — matches DOCKER_HOST in 15-podman.zsh
# Enables Docker-compatible tools (docker, docker-compose, VS Code Remote, etc.)
service_timeout = 0

[network]
network_backend = "netavark"
