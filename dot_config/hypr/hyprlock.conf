# hyprlock.conf — lock screen configuration (Catppuccin Mocha)

background {
    monitor =
    color = rgba(30, 30, 46, 1.0)  # base
    blur_passes = 2
    blur_size = 4
}

image {
    monitor =
    path = ~/.config/hypr/wallpapers/wallpaper.jpg
    size = 150
    rounding = -1
    position = 0, 200
    halign = center
    valign = center
    opacity = 0.8
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(cdd6f4)   # text
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgb(bac2de)   # subtext1
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 20
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = rgb(cba6f7)   # mauve
    inner_color = rgb(30, 30, 46)  # base
    font_color = rgb(cdd6f4)    # text
    fade_on_empty = true
    placeholder_text = <span foreground="##bac2de">  Enter Password</span>
    fail_color = rgb(243, 139, 168)  # red
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    position = 0, -80
    halign = center
    valign = center
}
