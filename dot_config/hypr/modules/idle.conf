# idle.conf — hypridle configuration
# System is configured to NEVER idle automatically.
# Screen lock is manual only: $mod + Escape
# Remote access (wayvnc, xrdp) remains accessible when hyprlock is active.

# hypridle is started by autostart.conf but intentionally has no timeouts.
# Add timeouts here only if you want automatic locking in the future:
#
# listener {
#     timeout = 900
#     on-timeout = hyprlock
# }
