###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# ==================== APPLICATION SHORTCUTS ====================
# Primary applications - Mnemonic keys, easy to remember
bind = $mainMod, Return, exec, $terminal         # Enter = Terminal (tiling WM standard)
bind = $mainMod, B, exec, $browser               # B = Browser
bind = $mainMod, E, exec, $fileManager           # E = Explorer/Files
bind = $mainMod, R, exec, $menu                  # R = Rofi/Run
bind = $mainMod, SUPER_L, exec, $menu            # Double-tap Super for menu
bind = $mainMod, P, exec, 1password --quick-access  # P = Password manager

# Window management - Single key for common actions
bind = $mainMod, W, killactive,                  # W = Window close
bind = $mainMod, F, fullscreen, 0                # F = Fullscreen
bind = $mainMod SHIFT, F, fullscreen, 1          # Maximized (keep gaps/bar)
bind = $mainMod, V, togglefloating,              # V = Float
bind = $mainMod, L, exec, hyprlock               # L = Lock
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, J, togglesplit,                 # J = Join/split (dwindle)
# bind = $mainMod SHIFT, W, exec, pkill waybar; waybar & # Restart waybar (replaced by AGS)

# System actions with Shift (less common, more impactful)
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy  # S = Screenshot to clipboard
bind = $mainMod SHIFT, P, exec, grim -g "$(slurp)" "$HOME/Pictures/Screenshots/Screenshot_$(date +'%Y-%m-%d_%H%M%S').png"  # P = Picture to file
bind = $mainMod SHIFT, R, exec, hyprctl reload   # R = Reload config
bind = $mainMod SHIFT, E, exec, hyprctl dispatch exit  # E = Exit Hyprland

# Quick access with Alt (alternate/advanced actions)
bind = $mainMod ALT, T, exec, $terminal -e htop  # T = Task manager
bind = $mainMod ALT, Return, exec, $browser      # Alt+Enter = Browser (vim-style alternate)

# Relocated functions (moved from conflicting keys)
bind = $mainMod SHIFT, T, pseudo,                # T = Tile mode (pseudo) - moved from P
bind = $mainMod SHIFT, O, layoutmsg, orientationcycle left top  # O = Orientation - moved from W

# Screenshots
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy # Area to clipboard
bind = SHIFT, Print, exec, grim -g "$(slurp)" "$HOME/Pictures/Screenshots/Screenshot_$(date +'%Y-%m-%d_%H%M%S').png" # Area to file

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##################################
### ENHANCED WINDOW MANAGEMENT ###
##################################

# Vim-style focus navigation (supplements existing arrow keys)
# Note: Super+L is reserved for Lock screen, Super+H/K are available for navigation
bind = $mainMod, H, movefocus, l
bind = $mainMod, K, movefocus, u

# Snap window to half screen - Arrow keys
bind = $mainMod CTRL, Left, exec, ~/.config/hypr/scripts/snap-window.sh left
bind = $mainMod CTRL, Right, exec, ~/.config/hypr/scripts/snap-window.sh right
bind = $mainMod CTRL, Up, exec, ~/.config/hypr/scripts/snap-window.sh top
bind = $mainMod CTRL, Down, exec, ~/.config/hypr/scripts/snap-window.sh bottom

# Snap window to half screen - Vim keys
bind = $mainMod CTRL, H, exec, ~/.config/hypr/scripts/snap-window.sh left
bind = $mainMod CTRL, L, exec, ~/.config/hypr/scripts/snap-window.sh right
bind = $mainMod CTRL, K, exec, ~/.config/hypr/scripts/snap-window.sh top
bind = $mainMod CTRL, J, exec, ~/.config/hypr/scripts/snap-window.sh bottom

# Snap window to quarters (corners)
bind = $mainMod CTRL, U, exec, ~/.config/hypr/scripts/snap-window.sh topleft
bind = $mainMod CTRL, I, exec, ~/.config/hypr/scripts/snap-window.sh topright
bind = $mainMod CTRL, N, exec, ~/.config/hypr/scripts/snap-window.sh bottomleft
bind = $mainMod CTRL, M, exec, ~/.config/hypr/scripts/snap-window.sh bottomright

# Center window
bind = $mainMod CTRL, C, exec, ~/.config/hypr/scripts/snap-window.sh center

# Resize window - Arrow keys (40px steps)
bind = $mainMod ALT, Left, resizeactive, -40 0
bind = $mainMod ALT, Right, resizeactive, 40 0
bind = $mainMod ALT, Up, resizeactive, 0 -40
bind = $mainMod ALT, Down, resizeactive, 0 40

# Resize window - Vim keys
bind = $mainMod ALT, H, resizeactive, -40 0
bind = $mainMod ALT, L, resizeactive, 40 0
bind = $mainMod ALT, K, resizeactive, 0 -40
bind = $mainMod ALT, J, resizeactive, 0 40

# Resize mode for fine-tuning (10px steps)
bind = $mainMod ALT, R, submap, resize
submap = resize
binde = , Left, resizeactive, -10 0
binde = , Right, resizeactive, 10 0
binde = , Up, resizeactive, 0 -10
binde = , Down, resizeactive, 0 10
binde = , H, resizeactive, -10 0
binde = , L, resizeactive, 10 0
binde = , K, resizeactive, 0 -10
binde = , J, resizeactive, 0 10
bind = , Escape, submap, reset
bind = , Return, submap, reset
submap = reset

# Swap windows in tiled layout - Arrow keys
bind = $mainMod SHIFT, Left, swapwindow, l
bind = $mainMod SHIFT, Right, swapwindow, r
bind = $mainMod SHIFT, Up, swapwindow, u
bind = $mainMod SHIFT, Down, swapwindow, d

# Swap windows - Vim keys
bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, L, swapwindow, r
bind = $mainMod SHIFT, K, swapwindow, u

# Minimize window (move to special workspace)
bind = $mainMod, Z, movetoworkspace, special:minimize
bind = $mainMod SHIFT, Z, togglespecialworkspace, minimize

# Toggle between dwindle and master layouts
bind = $mainMod, O, exec, ~/.config/hypr/scripts/switch-layout.sh

# Dwindle layout controls
bind = $mainMod, B, layoutmsg, preselect l
bind = $mainMod, A, layoutmsg, preselect r

# Master layout controls
# Note: Orientation cycle moved to Super+Shift+O (Super+W now used for Window close)
bind = $mainMod CTRL, Return, layoutmsg, swapwithmaster

# Move floating windows with keyboard
bind = $mainMod CTRL SHIFT, Left, moveactive, -40 0
bind = $mainMod CTRL SHIFT, Right, moveactive, 40 0
bind = $mainMod CTRL SHIFT, Up, moveactive, 0 -40
bind = $mainMod CTRL SHIFT, Down, moveactive, 0 40
bind = $mainMod CTRL SHIFT, H, moveactive, -40 0
bind = $mainMod CTRL SHIFT, L, moveactive, 40 0
bind = $mainMod CTRL SHIFT, K, moveactive, 0 -40
bind = $mainMod CTRL SHIFT, J, moveactive, 0 40

# Pin window to show on all workspaces
bind = $mainMod CTRL, P, pin
